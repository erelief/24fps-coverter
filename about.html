<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>关于 - 24fps Converter</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        background: #fff;
        color: #333;
        height: 100vh;
        padding: 20px 24px;
        user-select: none;
      }
      .title-row {
        display: flex;
        align-items: baseline;
        gap: 8px;
      }
      .app-name { font-size: 16px; font-weight: 700; color: #333; }
      .version {
        font-size: 13px; color: #888; margin-left: auto;
      }
      .divider {
        height: 1px; background: #ddd; margin: 12px 0;
      }
      .row {
        display: flex; justify-content: space-between;
        align-items: center; font-size: 13px;
      }
      .row + .row { margin-top: 8px; }
      .label { color: #888; }
      .value { color: #333; }
      .link {
        color: #4a9eff; text-decoration: none;
        display: inline-flex; align-items: center; gap: 4px;
      }
      .link:hover { text-decoration: underline; color: #2b7de9; }
    </style>
  </head>
  <body>
    <div class="title-row">
        <span class="app-name">24fps Converter</span>
        <span class="version">v<span id="ver"></span></span>
      </div>
      <div class="divider"></div>
      <div class="row">
        <span class="label">项目地址</span>
        <a class="link" href="https://github.com/erelief/24fps-coverter" target="_blank" rel="noopener noreferrer">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
          <span>erelief/24fps-coverter</span>
        </a>
      </div>
      <div class="row">
        <span class="label">开源许可</span>
        <span class="value">MIT License</span>
      </div>
      <div class="row">
        <span class="label">FFmpeg 版本</span>
        <a class="link" id="ffmpegVer" href="https://ffmpeg.org" target="_blank" rel="noopener noreferrer"></a>
      </div>

    <script type="module">
      import { invoke } from "@tauri-apps/api/core";
      import { getCurrentWebviewWindow } from "@tauri-apps/api/webviewWindow";

      const win = getCurrentWebviewWindow();

      // App version from Vite define (build-time injection)
      document.getElementById("ver").textContent = __APP_VERSION__;

      // FFmpeg version from runtime
      invoke("cmd_get_ffmpeg_version")
        .then((v) => { document.getElementById("ffmpegVer").textContent = v; })
        .catch(() => { document.getElementById("ffmpegVer").textContent = "获取失败"; });

      // Close on Escape
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") win.close();
      });
    </script>
  </body>
</html>
