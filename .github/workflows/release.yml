      - name: Prepare PNG icon for macOS
        run: |
          if [ ! -f src-tauri/icons/icon.icns ]; then
            cp resources/logo.png src-tauri/icons/32x32.png
            cp resources/logo.png src-tauri/icons/128x128.png
            cp resources/logo.png src-tauri/icons/128x128@2x.png
            # Generate .icns from PNG
            sips -z 16 16 src-tauri/icons/32x32.png --out /tmp/icon_16x16.png
            sips -z 32 32 src-tauri/icons/32x32.png --out /tmp/icon_16x16@2x.png
            sips -z 32 32 src-tauri/icons/32x32.png --out /tmp/icon_32x32.png
            sips -z 64 64 src-tauri/icons/128x128.png --out /tmp/icon_32x32@2x.png
            sips -z 128 128 src-tauri/icons/128x128.png --out /tmp/icon_128x128.png
            sips -z 256 256 src-tauri/icons/128x128@2x.png --out /tmp/icon_128x128@2x.png
            sips -z 256 256 src-tauri/icons/128x128@2x.png --out /tmp/icon_256x256.png
            sips -z 512 512 src-tauri/icons/128x128@2x.png --out /tmp/icon_256x256@2x.png
            sips -z 512 512 src-tauri/icons/128x128@2x.png --out /tmp/icon_512x512.png
            sips -z 1024 1024 src-tauri/icons/128x128@2x.png --out /tmp/icon_512x512@2x.png
            mkdir -p /tmp/icon.iconset
            cp /tmp/icon_16x16.png /tmp/icon.iconset/
            cp /tmp/icon_16x16@2x.png /tmp/icon.iconset/icon_32x32.png
            cp /tmp/icon_32x32.png /tmp/icon.iconset/
            cp /tmp/icon_32x32@2x.png /tmp/icon.iconset/icon_64x64.png
            cp /tmp/icon_128x128.png /tmp/icon.iconset/
            cp /tmp/icon_128x128@2x.png /tmp/icon.iconset/icon_256x256.png
            cp /tmp/icon_256x256.png /tmp/icon.iconset/
            cp /tmp/icon_256x256@2x.png /tmp/icon.iconset/icon_512x512.png
            cp /tmp/icon_512x512.png /tmp/icon.iconset/
            cp /tmp/icon_512x512@2x.png /tmp/icon.iconset/icon_1024x1024.png
            iconutil -c icns /tmp/icon.iconset -o src-tauri/icons/icon.icns
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '24fps Converter ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version.'
          releaseDraft: false
          prerelease: false
          args: --target x86_64-apple-darwin
